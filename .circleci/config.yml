version: 2.1

jobs:
  build-ios:
    macos:
      xcode: "15.4.0"
    resource_class: macos.m4.medium.gen2
    steps:
      - checkout
      - run:
          name: Install XcodeGen
          command: HOMEBREW_NO_AUTO_UPDATE=1 brew install xcodegen
      - run:
          name: Build iOS App
          command: |
            cd ios
            xcodegen generate --spec project.yml
            xcodebuild \
              -project AiChing.xcodeproj \
              -scheme AiChing \
              -destination 'generic/platform=iOS' \
              -configuration Debug \
              clean build \
              CODE_SIGN_IDENTITY="" \
              CODE_SIGNING_REQUIRED=NO \
              CODE_SIGNING_ALLOWED=NO
      - run:
          name: Package .ipa
          command: |
            APP_PATH=$(find ~/Library/Developer/Xcode/DerivedData -name '*.app' -type d -path '*/Debug-iphoneos/*' | head -1)
            mkdir -p Payload
            cp -R "$APP_PATH" Payload/
            zip -r AiChing.ipa Payload/
      - store_artifacts:
          path: AiChing.ipa

workflows:
  version: 2
  build:
    jobs:
      - build-ios
