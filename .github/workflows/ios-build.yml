name: Build iOS App

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  build-ios:
    name: Build AiChing (iOS)
    runs-on: macos-14  # M1 macOS runner with Xcode 15

    steps:
      - uses: actions/checkout@v4

      - name: Select Xcode
        run: sudo xcode-select -s /Applications/Xcode_15.4.app/Contents/Developer

      - name: Install XcodeGen 2.40
        run: |
          curl -sL https://github.com/XcodeGen/XcodeGen/releases/download/2.40.0/xcodegen.zip -o /tmp/xcodegen.zip
          unzip -q /tmp/xcodegen.zip -d /tmp/xcodegen
          sudo cp /tmp/xcodegen/bin/xcodegen /usr/local/bin/
          xcodegen --version

      - name: Generate Xcode Project
        run: |
          cd ios
          xcodegen generate --spec project.yml
          echo "Generated Xcode project:"
          ls -la AiChing.xcodeproj/
          cat AiChing.xcodeproj/project.pbxproj | head -5

      - name: Build iOS App
        run: |
          cd ios
          xcodebuild \
            -project AiChing.xcodeproj \
            -scheme AiChing \
            -destination 'platform=iOS Simulator,name=iPhone 15,OS=17.5' \
            -configuration Debug \
            clean build \
            CODE_SIGN_IDENTITY="" \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_ALLOWED=NO

      - name: Upload Build Artifacts
        uses: actions/upload-artifact@v4
        if: success()
        with:
          name: AiChing-build
          path: ~/Library/Developer/Xcode/DerivedData/**/Build/**/*.app
          retention-days: 3

  build-core:
    name: Build AiChingCore (Cross-Platform)
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [macos-14, ubuntu-latest]  # Windows included if Swift available
        # os: [macos-14, ubuntu-latest, windows-latest]

    steps:
      - uses: actions/checkout@v4

      - name: Build AiChingCore
        run: |
          cd ios/AiChingCore
          swift build

      - name: Test AiChingCore
        run: |
          cd ios/AiChingCore
          swift test 2>&1
        continue-on-error: ${{ matrix.os != 'macos-14' }}

  build-windows-swift:
    name: Build on Windows (Swift)
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Swift
        uses: compnerd/gha-setup-swift@main
        with:
          branch: swift-5.9-release

      - name: Build AiChingCore
        run: |
          cd ios/AiChingCore
          swift build
        shell: pwsh

      - name: Test AiChingCore
        run: |
          cd ios/AiChingCore
          swift test
        shell: pwsh
