name: Build iOS App

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  build-ios:
    name: Build AiChing (iOS)
    runs-on: macos-13  # macOS 13 runner with Xcode 15

    steps:
      - uses: actions/checkout@v4

      - name: Select Xcode
        run: sudo xcode-select -s /Applications/Xcode_15.0.app/Contents/Developer

      - name: Install XcodeGen
        run: |
          brew install xcodegen
          xcodegen --version

      - name: Generate Xcode Project (pre-compat mode)
        run: |
          cd ios
          xcodegen --version
          xcodegen generate --spec project.yml
          echo "Generated Xcode project:"
          ls -la AiChing.xcodeproj/
          # Show project format
          head -3 AiChing.xcodeproj/project.pbxproj

      - name: Build iOS App (device)
        run: |
          cd ios
          xcodebuild \
            -project AiChing.xcodeproj \
            -scheme AiChing \
            -destination 'generic/platform=iOS' \
            -configuration Debug \
            clean build \
            CODE_SIGN_IDENTITY="" \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_ALLOWED=NO \
            PRODUCT_BUNDLE_IDENTIFIER=com.aiching.app
          echo "BUILD_PATH=" >> $GITHUB_ENV
          echo "BUILD_PATH=$(find ~/Library/Developer/Xcode/DerivedData -name '*.app' -type d -path '*/Debug-iphoneos/*' | head -1)" >> $GITHUB_ENV

      - name: Package .ipa
        run: |
          APP_PATH="${{ env.BUILD_PATH }}"
          echo "App at: $APP_PATH"
          ls -la "$APP_PATH/"
          PAYLOAD_DIR="Payload"
          mkdir -p "$PAYLOAD_DIR"
          cp -R "$APP_PATH" "$PAYLOAD_DIR/"
          zip -r AiChing.ipa "$PAYLOAD_DIR"/
          ls -la AiChing.ipa

      - name: Upload .ipa
        uses: actions/upload-artifact@v4
        if: success()
        with:
          name: AiChing-ipa
          path: AiChing.ipa
          retention-days: 7

  # Removed build-core and build-windows-swift jobs to reduce runner demand.
  # Run them manually via `aich test` or `swift build` in the AiChingCore package.
